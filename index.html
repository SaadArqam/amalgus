<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AmalGus - Smart Glass Marketplace</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0B1F3A;
      color: white;
    }
    .serif {
      font-family: 'DM Serif Display', serif;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- Products Data -->
  <script src="products.js"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- APP CODE -->
  <script type="text/babel">

    // Products are loaded from products.js as window.products
    const products = window.products;
    const { useState } = React;

    // 🔹 Step 2: Parser Functions
    function parseQuery(query) {
      const normalized = query.toLowerCase().replace(/\s+/g, ' ').trim();
      
      const result = {
        thickness: null,
        category: null,
        color: null,
        useCases: [],
        features: []
      };

      const thicknessMatch = normalized.match(/(\d+)\s*mm/);
      if (thicknessMatch) {
        result.thickness = parseInt(thicknessMatch[1]);
      }

      const categoryMap = {
        'tempered glass': ['tempered', 'toughened', 'tempered glass'],
        'laminated glass': ['laminated', 'laminated glass'],
        'float glass': ['float', 'float glass'],
        'insulated glass unit': ['insulated', 'double glazed', 'insulated glass unit', 'igu'],
        'mirror': ['mirror', 'mirrors'],
        'aluminium hardware': ['aluminium', 'aluminum', 'hardware', 'aluminium hardware']
      };

      for (const [category, keywords] of Object.entries(categoryMap)) {
        if (keywords.some(keyword => normalized.includes(keyword))) {
          result.category = category;
          break;
        }
      }

      const colorMap = {
        'clear': ['clear', 'transparent'],
        'bronze': ['bronze', 'brown'],
        'frosted': ['frosted', 'opaque', 'privacy'],
        'tinted': ['tinted', 'colored', 'smoked']
      };

      for (const [color, keywords] of Object.entries(colorMap)) {
        if (keywords.some(keyword => normalized.includes(keyword))) {
          result.color = color;
          break;
        }
      }

      const useCaseMap = {
        'partition': ['partition', 'divider', 'cubicle'],
        'office': ['office', 'commercial', 'workplace'],
        'balcony': ['balcony', 'balconies'],
        'railing': ['railing', 'railings', 'guard', 'barrier'],
        'window': ['window', 'windows', 'glazing'],
        'residential': ['residential', 'home', 'house', 'domestic']
      };

      for (const [useCase, keywords] of Object.entries(useCaseMap)) {
        if (keywords.some(keyword => normalized.includes(keyword))) {
          result.useCases.push(useCase);
        }
      }

      const featureMap = {
        'uv': ['uv', 'ultraviolet', 'sun protection'],
        'polished': ['polished', 'smooth', 'finished'],
        'safety': ['safety', 'secure', 'protective'],
        'energy': ['energy', 'efficient', 'thermal'],
        'budget': ['budget', 'cheap', 'affordable', 'economical'],
        'low-e': ['low-e', 'low e', 'emissivity']
      };

      for (const [feature, keywords] of Object.entries(featureMap)) {
        if (keywords.some(keyword => normalized.includes(keyword))) {
          result.features.push(feature);
        }
      }

      return result;
    }

    // Validate if query has meaningful intent
    function isValidQuery(parsedQuery) {
      const hasCategory = parsedQuery.category !== null;
      const hasThickness = parsedQuery.thickness !== null;
      const hasUseCases = parsedQuery.useCases.length > 0;
      const hasFeatures = parsedQuery.features.length > 0;
      
      return hasCategory || hasThickness || hasUseCases || hasFeatures;
    }

    function calculateScore(product, parsedQuery) {
      const result = {
        score: 0,
        matchedFields: []
      };

      if (parsedQuery.category && product.category) {
        if (product.category.toLowerCase() === parsedQuery.category.toLowerCase()) {
          result.score += 30;
          result.matchedFields.push('category');
        } else {
          result.score -= 10;
        }
      }

      if (parsedQuery.thickness && product.thickness) {
        if (product.thickness === parsedQuery.thickness) {
          result.score += 25;
          result.matchedFields.push('thickness (exact)');
        } else if (Math.abs(product.thickness - parsedQuery.thickness) <= 2) {
          result.score += 15;
          result.matchedFields.push('thickness (partial)');
        }
      }

      if (parsedQuery.useCases && parsedQuery.useCases.length > 0 && product.tags) {
        const matchedTags = parsedQuery.useCases.filter(useCase => 
          product.tags.some(tag => tag.toLowerCase() === useCase.toLowerCase())
        );
        if (matchedTags.length > 0) {
          result.score += 25;
          result.matchedFields.push(`use-cases: ${matchedTags.join(', ')}`);
        }
      }

      let featureColorScore = 0;
      const matchedFeatures = [];

      if (parsedQuery.color && product.color) {
        if (product.color.toLowerCase() === parsedQuery.color.toLowerCase()) {
          featureColorScore += 10;
          matchedFeatures.push('color');
        }
      }

      if (parsedQuery.features && parsedQuery.features.length > 0) {
        const allText = `${product.description || ''} ${(product.tags || []).join(' ')}`.toLowerCase();
        const matchedFeatureList = parsedQuery.features.filter(feature => 
          allText.includes(feature.toLowerCase())
        );
        if (matchedFeatureList.length > 0) {
          featureColorScore += 10;
          matchedFeatures.push(`features: ${matchedFeatureList.join(', ')}`);
        }
      }

      if (featureColorScore > 0) {
        result.score += featureColorScore;
        result.matchedFields.push(...matchedFeatures);
      }

      // Enhanced scoring separation logic
      const hasCategoryMatch = result.matchedFields.includes('category');
      const hasThicknessMatch = result.matchedFields.some(field => field.startsWith('thickness'));
      const hasUseCaseMatch = result.matchedFields.some(field => field.startsWith('use-cases'));
      const hasFeatureMatch = result.matchedFields.some(field => field.startsWith('features') || field === 'color');
      
      // Strong match boost for category AND thickness
      if (hasCategoryMatch && hasThicknessMatch) {
        result.score += 15;
      }
      
      // Multi-match boost for 3+ attributes
      const attributeMatches = [hasCategoryMatch, hasThicknessMatch, hasUseCaseMatch, hasFeatureMatch].filter(Boolean).length;
      if (attributeMatches >= 3) {
        result.score += 10;
      }
      
      // Use-case priority boost
      if (hasUseCaseMatch) {
        result.score += 10;
      }
      
      // Penalty for weak matches (only 1 attribute)
      if (attributeMatches === 1) {
        result.score -= 10;
      }

      result.score = Math.max(0, Math.min(100, result.score));

      return result;
    }

    function matchProducts(query, products) {
      // Parse the query
      const parsedQuery = parseQuery(query);
      
      // Validate query - reject meaningless queries
      if (!isValidQuery(parsedQuery)) {
        return [];
      }
      
      // Pre-compute budget flag for efficiency
      const isBudgetQuery = parsedQuery.features.includes('budget');
      
      // Score all products with optimized explanation generation
      const scoredProducts = products.map(product => {
        const scoreResult = calculateScore(product, parsedQuery);
        
        // Smart explanation generation with natural sentences
        let explanation = "";
        const { matchedFields } = scoreResult;
        const score = scoreResult.score;
        
        // Build natural explanation based on matched attributes
        const explanationParts = [];
        
        // Category match
        if (matchedFields.includes('category')) {
          explanationParts.push(`This ${product.category.toLowerCase()} matches your requirements`);
        }
        
        // Thickness match
        if (matchedFields.includes('thickness (exact)')) {
          explanationParts.push(`with the exact ${product.thickness}mm thickness you need`);
        } else if (matchedFields.includes('thickness (partial)')) {
          explanationParts.push(`with a similar ${product.thickness}mm thickness`);
        }
        
        // Use case matches
        const useCaseMatch = matchedFields.find(field => field.startsWith('use-cases:'));
        if (useCaseMatch) {
          const useCases = useCaseMatch.replace('use-cases: ', '');
          explanationParts.push(`perfect for ${useCases}`);
        }
        
        // Feature matches
        const featureMatch = matchedFields.find(field => field.startsWith('features:'));
        if (featureMatch) {
          const features = featureMatch.replace('features: ', '');
          explanationParts.push(`featuring ${features}`);
        }
        
        // Color match
        if (matchedFields.includes('color')) {
          explanationParts.push(`in ${product.color} finish`);
        }
        
        // Build final explanation
        if (explanationParts.length > 0) {
          explanation = explanationParts.join(' and ') + '.';
          
          // Add mismatch hint for low scores
          if (score < 50) {
            explanation += ' However, it may not fully match all your requirements.';
          }
        } else {
          explanation = 'This product has some relevant characteristics.';
        }
        
        return {
          score: scoreResult.score,
          explanation: explanation,
          product: product
        };
      });
      
      // Optimized sorting with early return
      scoredProducts.sort((a, b) => {
        const scoreDiff = b.score - a.score;
        if (scoreDiff !== 0) return scoreDiff;
        
        // Only check budget tie-break if needed
        if (isBudgetQuery) {
          return (a.product.pricePerSqm || 0) - (b.product.pricePerSqm || 0);
        }
        
        return 0;
      });
      
      // Filter out low-relevance results (score < 30)
      const relevantProducts = scoredProducts.filter(item => item.score >= 30);
      
      // Return top 5 with product spread
      return relevantProducts.slice(0, 5).map(item => ({
        ...item.product,
        score: item.score,
        explanation: item.explanation
      }));
    }

    // 🔹 Step 3:// ProductCard Component
    function ProductCard({ product }) {
      const getScoreColor = (score) => {
        if (score >= 80) return 'bg-green-500';
        if (score >= 50) return 'bg-amber-500';
        return 'bg-red-500';
      };

      const getScoreTextColor = (score) => {
        if (score >= 80) return 'text-green-400';
        if (score >= 50) return 'text-amber-400';
        return 'text-red-400';
      };

      // Generate use case text from tags
      const getUseCaseText = () => {
        if (product.tags && product.tags.length > 0) {
          const useCases = product.tags.filter(tag => 
            ['office', 'partition', 'window', 'balcony', 'railing', 'residential', 'commercial'].includes(tag)
          );
          if (useCases.length > 0) {
            return useCases.map(tag => 
              tag === 'office' ? 'office spaces' :
              tag === 'partition' ? 'partitions' :
              tag === 'window' ? 'windows' :
              tag === 'balcony' ? 'balcony railings' :
              tag === 'railing' ? 'railings' :
              tag === 'residential' ? 'residential projects' :
              tag === 'commercial' ? 'commercial buildings' :
              tag
            ).slice(0, 2).join(', ');
          }
        }
        return 'general applications';
      };

      return (
        <div className="relative backdrop-blur-md bg-white/10 border border-white/20 rounded-xl p-8 shadow-lg hover:shadow-2xl hover:scale-105 transition-all duration-300 ease-out hover:bg-white/15">
          
          {/* Product Title Section */}
          <div className="flex justify-between items-start mb-6">
            <div className="flex-1 pr-4">
              <h3 className="text-xl font-bold text-white mb-2 leading-tight">{product.name}</h3>
              <p className="text-sm text-gray-500 font-medium">{product.supplier}</p>
            </div>
            <div className="text-right pl-2">
              <p className="text-2xl font-bold text-amber-400">¥{product.pricePerSqm}</p>
              <p className="text-xs text-gray-500 uppercase tracking-wide">per sqm</p>
            </div>
          </div>

          {/* Match Score - Moved higher for visibility */}
          <div className="mb-6">
            <div className="flex justify-between items-center mb-3">
              <span className="text-sm font-semibold text-gray-300">Match Score</span>
              <span className={`text-lg font-bold ${getScoreTextColor(product.score)}`}>
                {product.score}%
              </span>
            </div>
            <div className="w-full bg-gray-700/50 rounded-full h-3">
              <div
                className={`h-3 rounded-full transition-all duration-700 ease-out ${getScoreColor(product.score)}`}
                style={{ width: `${product.score}%` }}
              />
            </div>
          </div>

          {/* Quick Spec Summary */}
          <div className="mb-6">
            <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Specifications</p>
            <div className="flex flex-wrap gap-2">
              <span className="px-3 py-1 bg-blue-500/20 text-blue-300 text-xs font-semibold rounded-full border border-blue-400/30 backdrop-blur-sm">
                {product.thickness}mm
              </span>
              {product.width && product.height && (
                <span className="px-3 py-1 bg-purple-500/20 text-purple-300 text-xs font-semibold rounded-full border border-purple-400/30 backdrop-blur-sm">
                  {product.width}x{product.height}mm
                </span>
              )}
              <span className="px-3 py-1 bg-indigo-500/20 text-indigo-300 text-xs font-semibold rounded-full border border-indigo-400/30 backdrop-blur-sm">
                {product.category}
              </span>
              {product.color && (
                <span className="px-3 py-1 bg-green-500/20 text-green-300 text-xs font-semibold rounded-full border border-green-400/30 backdrop-blur-sm">
                  {product.color}
                </span>
              )}
              {product.coating && product.coating !== 'none' && (
                <span className="px-3 py-1 bg-amber-500/20 text-amber-300 text-xs font-semibold rounded-full border border-amber-400/30 backdrop-blur-sm">
                  {product.coating}
                </span>
              )}
            </div>
          </div>

          {/* Use Case / Application */}
          <div className="mb-6">
            <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Best For</p>
            <p className="text-sm text-gray-300 font-medium">
              {getUseCaseText()}
            </p>
          </div>

          {/* Key Highlight */}
          <div className="mb-6">
            <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Key Feature</p>
            <p className="text-sm text-gray-200 leading-relaxed font-medium">
              {product.description || 'Premium quality glass solution'}
            </p>
          </div>

          {/* Explanation Section */}
          <div className="border-t border-white/20 pt-6">
            <p className="text-sm font-bold text-gray-300 mb-3">Why this fits your requirement</p>
            <p className="text-sm text-gray-300 leading-relaxed">
              {product.explanation}
            </p>
          </div>

          <div className="absolute inset-0 rounded-xl bg-gradient-to-br from-white/5 to-transparent pointer-events-none" />
        </div>
      );
    }

    // 🔹 Step 4: Main App Component

    function App() {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [hasSearched, setHasSearched] = useState(false);
      const [selectedCategory, setSelectedCategory] = useState("All");
      const [loading, setLoading] = useState(false);
      const handleSearch = () => {
        setLoading(true);
        
        // Simulate AI processing delay for better UX
        setTimeout(() => {
          const filteredProducts = selectedCategory === "All"
            ? products
            : products.filter(p => p.category === selectedCategory);
          
          const matched = matchProducts(query, filteredProducts);
          console.log('Search results:', matched);
          setResults(matched);
          setHasSearched(true);
          setLoading(false);
        }, 300);
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter') {
          handleSearch();
        }
      };

      const handleClearSearch = () => {
        setQuery("");
        setResults([]);
        setHasSearched(false);
        setLoading(false);
      };

      const displayProducts = hasSearched ? results : 
        (selectedCategory === "All" 
          ? products 
          : products.filter(p => p.category === selectedCategory));

      return (
        <div className="min-h-screen p-8">
          <div className="max-w-6xl mx-auto">
            <h1 className="text-5xl serif mb-2 text-white">
              AmalGus
            </h1>
            <p className="text-xl text-gray-300 mb-8">
              India's Smartest Glass Marketplace
            </p>

            <div className="backdrop-blur-md bg-white/5 border border-white/10 rounded-xl p-6 mb-8">
              <div className="mb-4">
                <label className="block text-white font-semibold mb-2">
                  Filter by Category
                </label>
                <select
                  value={selectedCategory}
                  onChange={(e) => setSelectedCategory(e.target.value)}
                  className="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
                >
                  <option value="All">All</option>
                  <option value="Float Glass">Float Glass</option>
                  <option value="Tempered Glass">Tempered Glass</option>
                  <option value="Laminated Glass">Laminated Glass</option>
                  <option value="IGU">Insulated Glass Unit</option>
                  <option value="Mirror">Mirror</option>
                  <option value="Aluminium Hardware">Aluminium Hardware</option>
                </select>
              </div>
              
              <label className="block text-white font-semibold mb-3">
                What glass are you looking for?
              </label>
              <div className="flex gap-3">
                <input
                  className="flex-1 p-4 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
                  placeholder="e.g. 6mm tempered glass for office partitions"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                  onKeyPress={handleKeyPress}
                />
                <button
                  onClick={handleSearch}
                  className="px-8 py-4 bg-amber-500 hover:bg-amber-400 text-black font-semibold rounded-lg transition-all duration-200 ease-out hover:scale-105 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-amber-400"
                >
                  Find Best Matches
                </button>
                {hasSearched && (
                  <button
                    onClick={handleClearSearch}
                    className="px-6 py-4 bg-gray-600 hover:bg-gray-500 text-white font-medium rounded-lg transition-all duration-200 ease-out hover:scale-105 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-gray-400"
                  >
                    Clear Search
                  </button>
                )}
              </div>
              {!hasSearched && (
                <p className="text-gray-400 text-sm mt-3">
                  Browse our complete catalog or describe your requirements to find perfect matches.
                </p>
              )}
            </div>

            {/* Loading State */}
            {loading && (
              <div className="text-center py-16">
                <div className="backdrop-blur-md bg-white/5 border border-white/10 rounded-xl p-8">
                  <div className="flex items-center justify-center mb-4">
                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-amber-400"></div>
                  </div>
                  <h3 className="text-xl font-semibold text-white mb-2">
                    Finding best matches...
                  </h3>
                  <p className="text-gray-400">
                    Analyzing your requirements against our catalog
                  </p>
                </div>
              </div>
            )}

            {/* Results Section */}
            {!loading && (
              <>
                <div className="mb-6">
                  <div className="flex justify-between items-end">
                    <h2 className="text-2xl font-semibold text-white mb-2">
                      {hasSearched ? "Top Matches for your Requirement" : "Browse Products"}
                    </h2>
                    {displayProducts.length > 0 && (
                      <p className="text-gray-400 text-sm">
                        Showing {displayProducts.length} result{displayProducts.length !== 1 ? 's' : ''}
                        {selectedCategory !== "All" && ` in ${selectedCategory}`}
                      </p>
                    )}
                  </div>
                </div>

                {/* Results Grid */}
                {displayProducts.length > 0 ? (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {displayProducts.map((product, index) => (
                      <ProductCard key={`${product.id}-${index}`} product={product} />
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-16">
                    <div className="backdrop-blur-md bg-white/5 border border-white/10 rounded-xl p-8">
                      <h3 className="text-xl font-semibold text-white mb-2">
                        {hasSearched ? "No relevant products found" : "No products available"}
                      </h3>
                      <p className="text-gray-400">
                        {hasSearched 
                          ? "No relevant products found. Try specifying thickness, type, or use-case."
                          : "Check back later for new products."
                        }
                      </p>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
